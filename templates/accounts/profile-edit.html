{% extends 'base.html' %}
{% load static %}
{% load custom_filters %}
{% block extra_styles %}
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
{% endblock %}
{% block content %}
    <h1>Edit profile</h1>
    <div class="profile-view">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit">Save</button>
            </div>
        </form>
    </div>
{% endblock %}
